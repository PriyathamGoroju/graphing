<!DOCTYPE html>
<html lang="en" >
  <head>
    <title>Graph Plotting</title>
    <link rel="stylesheet" href="index.css" />
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.0.3/css/font-awesome.css"/>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.5.0/Chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.5.0/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  </head>

  <body>
    <div id="heading">
      <h2>Graph ploting</h2>
    </div>
    <div class="all">

      <div class="main">
        <div class="input">
          <h4 id="result">Enter</h4>
        </div>
        <div class="buttons">
          <button id="clear">AC</button>
          <button id="delete_single_num">
            <i class="fa fa-scissors" aria-hidden="true"></i>
          </button>
          <button id="Normal_btn">^</button>
          <button id="Normal_btn">x</button>
        </div>
        <div class="buttons">
          <button id="Normal_btn">sin</button>
          <button id="Normal_btn">cos</button>
          <button id="Normal_btn">tan</button>
          <button id="Normal_btn">1/x</button>
        </div>
        <div class="buttons">
          <button id="Normal_btn">cot</button>
          <button id="Normal_btn">log</button>
          <button id="Normal_btn">e</button>
          <button id="Normal_btn">/</button>
        </div>
        <div class="buttons">
          <button id="Normal_btn">7</button>
          <button id="Normal_btn">8</button>
          <button id="Normal_btn">9</button>
          <button id="Normal_btn">*</button>
        </div>
        <div class="buttons">
          <button id="Normal_btn">4</button>
          <button id="Normal_btn">5</button>
          <button id="Normal_btn">6</button>
          <button id="Normal_btn">-</button>
        </div>
        <div class="buttons">
          <button id="Normal_btn">1</button>
          <button id="Normal_btn">2</button>
          <button id="Normal_btn">3</button>
          <button id="Normal_btn">+</button>
        </div>
        <div class="buttons">
          <button id="Normal_btn">(</button>
          <button id="Normal_btn">)</button>
          <button id="Normal_btn">.</button>
          <button id="equalTo" onclick="getCurve()">plot</button>
        </div>
      </div>
      <div class="graph">
        <canvas id="myChart"></canvas>
        <div id="msgbox">
          <p id="msgheader">MESSAGE</p>
          <p id="msg">no messages</p>
        </div>
      </div>
      <script src="script.js"></script>
      <script src="./index.js"></script>
    </div>
  </body>
</html>
